<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}RealEstate{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg-gradient-start: #020617;
            --bg-gradient-end: #0b1120;
            --card-bg: rgba(15, 23, 42, 0.96);
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.12);
            --error: #f97373;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --border-subtle: rgba(148, 163, 184, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, #1f2937 0, transparent 55%),
                radial-gradient(circle at bottom right, #0369a1 0, transparent 55%),
                linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            display: flex;
            flex-direction: column;
        }

        .page-shell {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            backdrop-filter: blur(18px);
            background: linear-gradient(to right, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.82));
            border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            background: radial-gradient(circle at 0 0, #e0f2fe 0, transparent 60%),
                        radial-gradient(circle at 100% 100%, #0ea5e9 0, transparent 55%),
                        linear-gradient(135deg, #22d3ee, #0ea5e9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 30px rgba(8, 47, 73, 0.6);
            font-weight: 800;
            font-size: 16px;
            color: #0f172a;
        }

        .logo-text-main {
            font-weight: 600;
            letter-spacing: 0.04em;
            font-size: 15px;
        }

        .logo-text-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn, .nav-btn-secondary {
            border-radius: 999px;
            padding: 8px 14px;
            border: 1px solid transparent;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .nav-btn {
            background: linear-gradient(135deg, #0ea5e9, #22c55e);
            color: #0b1120;
            font-weight: 600;
            box-shadow: 0 10px 22px rgba(34, 197, 94, 0.5);
        }

        .nav-btn-secondary {
            background: rgba(15, 23, 42, 0.9);
            color: var(--text-main);
            border-color: var(--border-subtle);
        }

        .nav-username {
            font-size: 13px;
            color: var(--text-muted);
        }

        .content-wrap {
            flex: 1;
            padding: 40px 16px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-centered {
            width: 100%;
            max-width: 420px;
            border-radius: 22px;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            padding: 24px 22px 22px;
            box-shadow:
                0 22px 45px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(15, 23, 42, 0.95);
        }

        .auth-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .error-list {
            margin: 0 0 12px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(248, 113, 113, 0.12);
            border: 1px solid rgba(248, 113, 113, 0.6);
            color: #fecaca;
            font-size: 12px;
            list-style: none;
        }

        .profile-shell {
            width: min(100%, 1100px);
            border-radius: 26px;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            padding: 22px 22px 20px;
            box-shadow:
                0 26px 55px rgba(15, 23, 42, 0.95),
                0 0 0 1px rgba(15, 23, 42, 0.95);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .profile-title {
            font-size: 22px;
            font-weight: 600;
        }

        .profile-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid rgba(56, 189, 248, 0.6);
            font-size: 11px;
            color: #e0f2fe;
        }

        .profile-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab-link {
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15, 23, 42, 0.9);
            font-size: 13px;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
        }

        .tab-link.active {
            border-color: rgba(56, 189, 248, 0.9);
            background: rgba(8, 47, 73, 0.95);
            color: #e0f2fe;
        }

        .divider {
            margin: 14px 0;
            border-top: 1px solid rgba(148, 163, 184, 0.4);
        }

        .field-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .field-input {
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.55);
            background: rgba(15, 23, 42, 0.98);
            padding: 9px 13px;
            font-size: 13px;
            color: var(--text-main);
        }

        .muted {
            font-size: 12px;
            color: var(--text-muted);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 16px;
        }

        .profile-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 260px;
            overflow: auto;
            padding-right: 4px;
        }

        .profile-item {
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.55);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.86));
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }

        .profile-item-main {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-item-title {
            font-size: 14px;
            font-weight: 500;
        }

        .profile-item-meta {
            font-size: 11px;
            color: #9ca3af;
        }

        .profile-item-extra {
            font-size: 12px;
            color: #e5e7eb;
        }

        .danger-btn {
            border-radius: 999px;
            border: 1px solid rgba(248, 113, 113, 0.7);
            background: rgba(127, 29, 29, 0.9);
            color: #fee2e2;
            font-size: 11px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .profile-footer {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 900px) {
            .profile-shell {
                width: 100%;
            }
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="page-shell">
    <header class="nav">
        <div class="nav-left">
            <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
                <div class="logo-mark">R</div>
                <div>
                    <div class="logo-text-main">RealEstate</div>
                    <div class="logo-text-sub">CRM &amp; витрина объектов</div>
                </div>
            </a>
        </div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span class="nav-username">
                    {{ user.first_name|default:user.username }}
                </span>
                <a href="{% url 'profile' %}" class="nav-btn-secondary">Профиль</a>
                <a href="{% url 'logout-page' %}" class="nav-btn">Выйти</a>
            {% else %}
                <a href="{% url 'login-page' %}" class="nav-btn-secondary">Войти</a>
                <a href="{% url 'register-page' %}" class="nav-btn">Регистрация</a>
            {% endif %}
        </div>
    </header>

    <main class="content-wrap">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
